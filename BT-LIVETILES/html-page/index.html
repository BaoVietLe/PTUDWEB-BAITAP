<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Bài tập về nhà: Live Tiles </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light p-4">

    <div class="container container-border p-1">
        
        <div class="row g-0 header-bg align-items-center">
            <div class="col-9 p-3">
                <h3 class="m-0 text-uppercase fw-normal">Chia bố cục theo phong cách live tiles</h3>
            </div>
            <div class="col-3 bg-white text-end">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/Logo_UEH_xanh.png" 
                     alt="Map" style="height: 60px; object-fit: contain;">
            </div>
        </div>

        <div class="subheader-bg w-100"></div>

        <div class="p-2">
            
            <div class="row g-2 mb-2">
                <div class="col-2"><div class="tile bg-l-green"></div></div>
                <div class="col-2"><div class="tile bg-l-blue"></div></div>
                <div class="col-4"><div class="tile bg-purple-light"></div></div>
                <div class="col-2"><div class="tile bg-purple-dark"></div></div>
                <div class="col-2"><div class="tile bg-blue-medium"></div></div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-2"><div class="tile bg-green"></div></div>
                <div class="col-2"><div class="tile bg-grey-blue"></div></div>
                <div class="col-2"><div class="tile bg-red"></div></div>
                <div class="col-2"><div class="tile bg-yellow"></div></div>
                <div class="col-4"><div class="tile bg-m-green"></div></div>
            </div>

            <div class="row g-2">
                <div class="col-2"><div class="tile bg-orange"></div></div>
                <div class="col-2"><div class="tile bg-grey"></div></div>
                <div class="col-4"><div class="tile bg-blue-dark"></div></div>
                <div class="col-2"><div class="tile bg-cyan"></div></div>
                <div class="col-2"><div class="tile bg-teal"></div></div>
            </div>

        </div>

        <div class="footer-bg w-100"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
