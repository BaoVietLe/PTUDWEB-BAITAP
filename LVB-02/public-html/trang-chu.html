<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 4: Tạo Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="/css/trang-chu.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="row g-0">
        <div class="col-12 bg-primary d-flex align-items-center justify-content-center text-white fw-bold" 
        style="height: 100px;">
         
        </div>
    </div>

    <div class="row g-0">
        <div class="col-12 d-flex align-items-center justify-content-center text-white fw-bold" 
        style="height: 30px; background-color: #fd7e14;">
        
        </div>
    </div>

    <div class="row g-0">
        <div class="col-3 bg-success d-flex align-items-center justify-content-center text-white fw-bold" 
        style="height: 200px;">
        
        </div>
        <div class="col-6 bg-info d-flex align-items-center justify-content-center text-white fw-bold" 
        style="height: 200px; background-color: #004085 !important;">
      
        </div>
        <div class="col-3">
            <div class="bg-warning d-flex align-items-center justify-content-center text-dark fw-bold" style="height: 100px;">
            
            </div>
            <div class="d-flex align-items-center justify-content-center text-white fw-bold" 
            style="height: 100px; background-color: #6f42c1;">
           
            </div>
        </div>
    </div>

    <div class="row g-0">
        <div class="col-4">
            <div class="d-flex align-items-center justify-content-center text-white fw-bold" 
            style="height: 125px; background-color: #17a2b8;">
            </div>
            <div class="bg-warning d-flex align-items-center justify-content-center text-dark fw-bold" 
            style="height: 125px;">
          
            </div>
        </div>
        
        <div class="col-8 bg-success d-flex align-items-center justify-content-center text-white fw-bold" 
        style="height: 250px;">
    
        </div>
    </div>

    <div class="row g-0">
        <div class="col-12 d-flex align-items-center justify-content-center text-white fw-bold" 
        style="height: 60px; background-color: #a29bfe;">
        
        </div>
    </div>
</div>

</body>
</html>
